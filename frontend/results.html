<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Deadass Search</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Top bar -->
<div class="top-bar">
    <div class="top-inner">

        <!-- Logo -->
        <div class="logo small">
            <span class="blue">D</span><span class="red">e</span><span class="yellow">a</span>
            <span class="blue">d</span><span class="green">a</span><span class="red">s</span>
            <span class="blue">s</span><span class="green">.</span>
        </div>

        <!-- 🔥 Search bar wrapper -->
        <div class="search-wrapper">
            <input
                id="searchBox"
                type="text"
                placeholder="Search..."
            >
            <button id="searchBtn" class="circle-btn">🔍</button>
        </div>

    </div>
</div>

<!-- Results -->
<div class="results-wrapper">
    <div class="results-container" id="results"></div>
</div>

<script src="results.js"></script>
</body>
</html>
