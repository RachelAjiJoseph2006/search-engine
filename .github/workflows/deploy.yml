name: Deploy

on:
  push:
    branches: [main]

env:
  DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build backend
        run: |
          docker build \
            -t $DOCKER_USER/webdev-backend:latest \
            ./backend

      - name: Build frontend
        run: |
          docker build \
            -t $DOCKER_USER/webdev-frontend:latest \
            ./deadass-react

      - name: Push backend
        run: docker push $DOCKER_USER/webdev-backend:latest

      - name: Push frontend
        run: docker push $DOCKER_USER/webdev-frontend:latest

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Restart backend
        run: |
          az webapp restart \
            --resource-group my-rg \
            --name racheljoseph-webdev-backend

      - name: Restart frontend
        run: |
          az webapp restart \
            --resource-group my-rg \
            --name racheljoseph-webdev-frontend