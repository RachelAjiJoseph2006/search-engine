name: Deploy Python Backend to Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }} # 👈 This explicitly hands over the login key bundle!

      - name: Deploy Backend Folder to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'rag-search-engine'
          slot-name: 'Production'
          package: './backend'